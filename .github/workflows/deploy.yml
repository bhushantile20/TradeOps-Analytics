name: CI/CD Pipeline — TradeOps Analytics

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Test
  # ─────────────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Django system checks
        run: |
          cd ML_Dashboard
          python manage.py check
        env:
          DJANGO_SETTINGS_MODULE: main_dashboard.settings
          DJANGO_SECRET_KEY: test-key-for-ci-only

  # ─────────────────────────────────────────────
  # JOB 2: Deploy (only on push to main)
  # ─────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Azure VM
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 172.188.64.81
          username: azureuser
          key: ${{ secrets.AZURE_SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/tradeops

            echo "📥 Pulling latest code..."
            git pull origin main

            echo "📦 Installing new dependencies..."
            source venv/bin/activate
            pip install -r requirements.txt --quiet

            echo "🗄️ Running migrations..."
            cd ML_Dashboard
            python manage.py migrate --noinput
            python manage.py collectstatic --noinput
            cd ..

            echo "🔄 Restarting services..."
            sudo systemctl restart tradeops-fastapi
            sudo systemctl restart tradeops-django

            echo "✅ Deployment complete!"

  # ─────────────────────────────────────────────
  # JOB 3: Health Check (verify site is up)
  # ─────────────────────────────────────────────
  health-check:
    name: 🏥 Health Check
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Wait for services to restart
        run: sleep 15

      - name: Check site is responding
        run: |
          STATUS=$(curl -o /dev/null -s -w "%{http_code}" https://tradeopsanalytics.bhushantile.online)
          if [ "$STATUS" -eq 200 ] || [ "$STATUS" -eq 301 ] || [ "$STATUS" -eq 302 ]; then
            echo "✅ Site is up! HTTP status: $STATUS"
          else
            echo "❌ Site returned HTTP $STATUS"
            exit 1
          fi

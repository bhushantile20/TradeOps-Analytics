{% for run in runs %}
<tr class="hover:bg-sky-50 transition-colors group border-b border-gray-100">
    <td class="py-4 px-6 text-gray-500 text-sm font-medium">{{ run.start_time }}</td>
    <td class="py-4 px-6 font-semibold text-gray-900">{{ run.run_name }}</td>
    <td class="py-4 px-6">
        <span class="px-2 py-1 rounded-md text-[10px] font-bold uppercase tracking-wider bg-gray-50 text-gray-600 border border-gray-200 shadow-sm">
            {{ run.model_type|default:"N/A" }}
        </span>
    </td>
    <td class="py-4 px-6 font-mono text-sm text-gray-500 text-right">{{ run.rmse|floatformat:6 }}</td>
    <td class="py-4 px-6 text-right">
        <div class="flex items-center justify-end space-x-3">
            <span class="text-sm font-medium text-gray-600">{{ run.accuracy|default:0|floatformat:1 }}%</span>
            <div class="w-16 bg-gray-200 h-1.5 rounded-full overflow-hidden">
                <div class="bg-sky-400 h-full" style="width: {{ run.accuracy|default:0|floatformat:0 }}%">
                </div>
            </div>
        </div>
    </td>
    <td class="py-4 px-6 text-center">
        <div class="inline-flex items-center px-2 py-1 rounded-md bg-green-50 text-green-600 border border-green-200 text-[10px] font-bold uppercase tracking-wider">
            {{ run.status }}
        </div>
    </td>
</tr>
{% empty %}
<tr>
    <td colspan="6" class="py-8 px-6 text-center text-gray-500 text-sm">No MLflow runs detected.</td>
</tr>
{% endfor %}

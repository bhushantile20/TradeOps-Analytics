project_name: btc_forecasting
data:
  symbol: BTC/USDT
  timeframe: 5m
  limit: 2000
  raw_path: data/raw/btc_raw.parquet
  processed_path: data/processed/btc_features.parquet

features:
  lags: [1, 2, 3, 6, 12, 24]
  rolling_windows: [5, 10]
  indicators:
    rsi: 14
    ma: [10, 20]

models:
  arima:
    order: [5, 1, 0]
  linear_regression:
    features: ['lag_1', 'lag_2', 'lag_3', 'lag_6', 'lag_12', 'lag_24', 'rolling_mean_5', 'rolling_mean_10', 'rolling_std_5', 'rolling_std_10', 'RSI', 'moving_average_10', 'moving_average_20', 'volume']
  lstm:
    lookback: 24
    units: 100
    epochs: 20
    batch_size: 32
  rnn:
    lookback: 24
    units: 100
    epochs: 20
    batch_size: 32
  train_test_split: 0.8

mlflow:
  experiment_name: btc_forecasting_models
  tracking_uri: mlruns

monitoring:
  drift_threshold: 0.2


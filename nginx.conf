events { worker_connections 1024; }

http {
    upstream django_app {
        server django-dashboard:8000;
    }

    upstream fastapi_app {
        server fastapi-service:8000;
    }

    # HTTP — redirect to HTTPS
    server {
        listen 80;
        server_name tradeopsanalytics.bhushantile.online;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS — Main server block
    server {
        listen 443 ssl;
        server_name tradeopsanalytics.bhushantile.online;

        ssl_certificate /etc/letsencrypt/live/tradeopsanalytics.bhushantile.online/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/tradeopsanalytics.bhushantile.online/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Security headers
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header Referrer-Policy strict-origin-when-cross-origin;

        # FastAPI backend — accessible at /api/
        location /api/ {
            proxy_pass http://fastapi_app/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
        }

        # Django dashboard — root /
        location / {
            proxy_pass http://django_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # Static files with caching
        location /static/ {
            proxy_pass http://django_app/static/;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }
}
